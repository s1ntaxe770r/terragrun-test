generate_projects:
  blocks:
    - block_name: infra
      root_dir: "infra/"
      workflow: default
      terragrunt_parsing:
        cascadeDependencies: true
        dependsOnOrdering: true
  drift_exclude_patterns:
    - "infra/_global/**"
  drift_include_patterns:
    - "infra/dev/**"
reporting:
  ai_summary: true
workflows:
  default:
    plan:
      steps:
        - init
        - plan
    apply:
      steps:
        - init
        - apply
