generate_projects:
  blocks:
    - block_name: example
      terragrunt: true
      root_dir: "infra/"
      workflow: default
      terragrunt_parsing:
        cascadeDependencies: true
        dependsOnOrdering: true

reporting:
  ai_summary: true
workflows:
  default:
    plan:
      steps:
        - init
        - plan
    apply:
      steps:
        - init
        - apply
